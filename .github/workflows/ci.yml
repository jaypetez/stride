name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs (supply-chain hardening).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint & format check
        run: pnpm lint

  test:
    # Platform matrix: dev is Windows/Node 24, CI historically Ubuntu/Node 22.
    # The TypeScript 7 native compiler and esbuild are platform-specific binaries,
    # so exercise every combination to catch drift (AGENTS.md).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # typecheck & build drive platform-specific native binaries (the TS 7
      # native compiler, esbuild) that occasionally crash on the Windows runner
      # under load. Bounded retry rides out that transient flake; a real error
      # fails all attempts. (bash is available on all three runner OSes.)
      - name: Type check
        shell: bash
        run: for a in 1 2 3; do pnpm typecheck && exit 0; echo "::warning::typecheck attempt $a failed (native-tooling flake); retrying"; done; exit 1
      - name: Test
        run: pnpm test
      - name: Build
        shell: bash
        run: for a in 1 2 3; do pnpm build && exit 0; echo "::warning::build attempt $a failed (native-tooling flake); retrying"; done; exit 1
      - name: Verify (runtime smoke)
        run: pnpm verify

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Coverage
        run: pnpm coverage
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: "**/coverage/**"
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright (chromium)
        run: pnpm --filter @stride/web exec playwright install --with-deps chromium
      - name: Web e2e (Playwright)
        run: pnpm --filter @stride/web e2e

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies (fail on high+)
        # `pnpm audit` POSTs to npm's legacy audit endpoints, which npm has
        # retired (HTTP 410 → ERR_PNPM_AUDIT_BAD_RESPONSE). Treat that specific
        # infra failure as a soft warning so it can't wedge the required gate,
        # while still failing hard on genuine high+ advisories. Vulnerability
        # coverage is redundantly enforced by dependency-review + CodeQL.
        shell: bash
        run: |
          set +e
          out="$(pnpm audit --audit-level=high 2>&1)"
          code=$?
          echo "$out"
          if [ "$code" -ne 0 ] && echo "$out" | grep -qE "ERR_PNPM_AUDIT_BAD_RESPONSE|being retired"; then
            echo "::warning::npm audit endpoint retired; advisory fetch skipped (covered by dependency-review + CodeQL)."
            exit 0
          fi
          exit "$code"

  # Aggregate gate — this is the single required status check on `main`.
  # It passes only when every CI job above succeeds.
  build:
    needs: [lint, test, coverage, e2e, audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all CI jobs passed
        run: |
          echo "lint=${{ needs.lint.result }} test=${{ needs.test.result }} coverage=${{ needs.coverage.result }} e2e=${{ needs.e2e.result }} audit=${{ needs.audit.result }}"
          for r in "${{ needs.lint.result }}" "${{ needs.test.result }}" "${{ needs.coverage.result }}" "${{ needs.e2e.result }}" "${{ needs.audit.result }}"; do
            if [ "$r" != "success" ]; then
              echo "::error::A required CI job did not succeed."
              exit 1
            fi
          done
          echo "All CI jobs passed."
